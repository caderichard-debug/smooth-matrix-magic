name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN must allow artifact upload + Pages deploy (see GitHub starter “static” workflow).
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Nitro build (Vercel preset)
        run: npm run build
        env:
          VERCEL: "1"

      - name: Prerender static site for Pages
        run: node scripts/prerender-github-pages.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - id: deployment
        uses: actions/deploy-pages@v4
